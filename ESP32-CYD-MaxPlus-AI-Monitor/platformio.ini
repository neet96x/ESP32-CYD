
[platformio]
default_envs = esp32-2432S028R

[env:esp32-2432S028R]
platform = espressif32
board = esp32dev
framework = arduino

; --- Serial Monitor ---
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; --- Upload ---
upload_speed = 921600

; --- TFT_eSPI pin config for CYD / HW-458 (ILI9341, 320x240) ---
build_flags =
    -D CORE_DEBUG_LEVEL=0
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D SMOOTH_FONT=1

board_build.filesystem = spiffs

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bblanchon/ArduinoJson @ ^7.0.0
    knolleary/PubSubClient @ ^2.8
    tcmenu/tcUnicodeHelper @ ^1.2.3